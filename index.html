<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Chaka Canvassing v4.31</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

</head>
<body>
  <div id="offline-banner"></div>
  <div id="header"></div>
  <div id="sync-bar"></div>
  <div class="container">
    <div id="map-wrap"><div id="map"></div></div>
    <div id="sidebar"></div>
  </div>
  <!-- chat panel built dynamically by ui.js -->
  <div id="toast-container"></div>
  <div class="app-footer">By Brent Billington for Chaka Campaign &middot; <span id="app-version"></span></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  <!-- Parcel data + utils must load before app modules -->
  <script src="parcels.js?v=4.31"></script>
  <script src="parcels_utils.js?v=4.31"></script>
  <script src="cisd_boundary.js?v=4.31"></script>
  <script src="cisd_schools.js?v=4.31"></script>

  <!-- App modules -->
  <script src="version.js?v=4.31"></script>
  <script src="config.js?v=4.31"></script>
  <script src="sheets.js?v=4.31"></script>
  <script src="map.js?v=4.31"></script>
  <script src="turf_draw.js?v=4.31"></script>
  <script src="ui.js?v=4.31"></script>
  <script src="app.js?v=4.31"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const vEl = document.getElementById('app-version');
      if (vEl) vEl.textContent = typeof APP_VERSION !== 'undefined' ? APP_VERSION : '';
      UI.init();
    });
  </script>
</body>
</html>
